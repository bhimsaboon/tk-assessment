apiVersion: v1
kind: ConfigMap
metadata:
  name: techkraft-api-config
data:
  APP_ENV: "production"
  APP_NAME: "techkraft-api"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: techkraft-api
  labels:
    app: techkraft-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techkraft-api
  template:
    metadata:
      labels:
        app: techkraft-api
    spec:
      containers:
        - name: api
          image: ghcr.io/techkraft/flask-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: techkraft-api-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: techkraft-api
  labels:
    app: techkraft-api
spec:
  type: ClusterIP
  selector:
    app: techkraft-api
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: techkraft-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: techkraft-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

